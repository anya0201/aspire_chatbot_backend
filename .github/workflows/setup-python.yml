name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest  # can be windows-latest if you prefer

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  # or whatever you need

    - name: Upgrade pip and install packages
      run: |
        python -m pip install --upgrade pip
        pip install fastapi==0.105.0 streamlit==1.56.0 rich==14.3.3
